<!DOCTYPE html>
<html>
<head>
    <title>Login & Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4 login-box text-center">

            <img src="school logo.webp" class="school-logo mb-3">

            <h4>Login</h4>
            <input type="text" id="username" class="form-control mb-2" placeholder="Username">
            <input type="password" id="password" class="form-control mb-2" placeholder="Password">
            <button onclick="login()" class="btn btn-dark w-100 mb-3">Login</button>

            <hr>

            <h5>Register</h5>
            <input type="text" id="regUser" class="form-control mb-2" placeholder="New Username">
            <input type="password" id="regPass" class="form-control mb-2" placeholder="New Password">
            <button onclick="register()" class="btn btn-success w-100">Register</button>

        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
