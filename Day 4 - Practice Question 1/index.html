<!DOCTYPE html>
<html>
<head>
<title>Student Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-warning bg-warning px-3">
    <img src="school logo.webp" class="school-logo me-3">
    <span class="navbar-brand">Spring Flowers School</span>

    <div class="ms-auto">
        <button onclick="showProfile()" class="btn btn-dark me-2">Student Profile</button>
        <a href="timetable.html" class="btn btn-primary me-2">TimeTable</a>
        <a href="monthly.html" class="btn btn-success me-2">Monthly Chart</a>
        <a href="login.html" class="btn btn-danger">Logout</a>
    </div>
</nav>

<div id="welcome" class="container text-center mt-5">
    <h2>Welcome to Spring Flowers School</h2>
</div>

<div id="profile" class="container mt-5 d-none">

    <div class="profile-container">

        <div class="student-image">
            <img src="student profile.jpg" class="student-img">
        </div>

        <div class="student-info">
            <h3>Student Information</h3>
            <p><strong>Name:</strong> John Doe</p>
            <p><strong>Class:</strong> 10</p>
            <p><strong>Roll No:</strong> 23</p>
            <p><strong>School:</strong> Spring Flowers School</p>
        </div>

    </div>

</div>


</div>

<script src="script.js"></script>
</body>
</html>
