<!DOCTYPE html>
<html>
<head>
<title>Course Live Chat</title>

<style>

body{
font-family:Arial;
background:#f0f2f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.chat-box{
width:400px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
}

.header{
background:#4CAF50;
color:white;
padding:15px;
text-align:center;
font-size:18px;
border-radius:10px 10px 0 0;
}

.messages{
list-style:none;
padding:10px;
height:300px;
overflow-y:auto;
}

.messages li{
padding:8px;
margin:5px 0;
background:#e8f5e9;
border-radius:5px;
}

.input-area{
display:flex;
border-top:1px solid #ddd;
}

.input-area input{
flex:1;
padding:10px;
border:none;
outline:none;
}

.input-area button{
background:#4CAF50;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="chat-box">

<div class="header">Live Instructor Chat</div>

<ul id="messages" class="messages"></ul>

<div class="input-area">
<input id="message" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

function sendMessage(){

const input=document.getElementById("message");

const msg=input.value;

if(msg.trim()==="") return;

socket.emit("chat message",msg);

input.value="";

}

socket.on("chat message",(msg)=>{

const li=document.createElement("li");

li.textContent=msg;

document.getElementById("messages").appendChild(li);

});

</script>

</body>
</html>
